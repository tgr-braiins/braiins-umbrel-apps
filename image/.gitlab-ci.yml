# REFERENCE pipeline (GitLab CI syntax) — adapt to wherever the image build lands.
# Builds the Braiins Manager Agent Umbrel image (x86_64 + aarch64) and pushes
# to ghcr.io. Runs on tags like umbrel-4.10.0 (tag = "umbrel-" + upstream agent version).
#
# Required CI/CD variables (Settings → CI/CD → Variables, masked):
#   GHCR_USER  — GitHub username owning the package (tgr-braiins for now)
#   GHCR_TOKEN — GitHub PAT with write:packages
#
# The umbrel-app-store repo on GitHub (manifests, icon) is updated separately —
# after this pipeline publishes the image, pin the multi-arch INDEX digest in
# docker-compose.yml (docker buildx imagetools inspect <image>:<tag>) and bump
# `version` in umbrel-app.yml.

build-push:
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_TAG =~ /^umbrel-/'
  variables:
    IMAGE: ghcr.io/$GHCR_USER/braiins-manager-agent
    TAG: $CI_COMMIT_TAG # umbrel-X.Y.Z-build-N
  script:
    - VERSION=${TAG#umbrel-}
    - docker run --privileged --rm tonistiigi/binfmt --install arm64
    - docker buildx create --use
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
    - docker buildx build
      --platform linux/amd64,linux/arm64
      --tag "$IMAGE:$VERSION"
      --push .
    - docker buildx imagetools inspect "$IMAGE:$VERSION"
