# Watches the public Braiins Manager Agent release feed and opens a bump PR
# when a new version ships. Fully separable from the app package: it only
# automates the manual "Release flow" documented in the README — delete this
# directory and the manual flow still works.
#
# Trigger paths:
#   - schedule: daily poll of downloads.braiins.com
#   - workflow_dispatch: manual run from the Actions tab (for testing)
#   - repository_dispatch (type agent-release): for a future push-based hookup
#     from the agent release pipeline (event-driven instead of polling)
#
# A maintainer reviews and merges the PR; that is deliberate — nothing ships
# to users without a human click.

name: agent-update

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [agent-release]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      REGISTRY_OWNER: ${{ github.repository_owner }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/braiins-manager-agent
    steps:
      - uses: actions/checkout@v4

      - name: Check release feed, bump files if newer
        id: bump
        run: python3 .github/scripts/bump.py check

      - name: Set up QEMU (arm64)
        if: steps.bump.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up buildx
        if: steps.bump.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        if: steps.bump.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 image for smoke test
        if: steps.bump.outputs.changed == 'true'
        run: docker buildx build --platform linux/amd64 --provenance=false --load --tag smoke-test:local image/

      - name: Smoke test
        if: steps.bump.outputs.changed == 'true'
        run: |
          set -eux
          docker run -d --name smoke -p 18080:8080 --user 1000:1000 --init smoke-test:local
          sleep 3
          curl -fs http://localhost:18080/status | grep '"configured": false'
          curl -fs -X POST --data "agent_id=123e4567-e89b-42d3-a456-426614174000&secret_key=123e4567-e89b-42d3-a456-426614174001" http://localhost:18080/ | grep '"ok": true'
          sleep 10
          curl -fs http://localhost:18080/status | grep '"running": true'
          curl -fs http://localhost:18080/widgets/status | grep '"three-stats"'
          docker logs smoke 2>&1 | tail -5
          docker rm -f smoke

      - name: Build and push multi-arch image
        if: steps.bump.outputs.changed == 'true'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=false \
            --tag "$IMAGE:${{ steps.bump.outputs.version }}" \
            --push image/

      - name: Pin multi-arch index digest in compose
        if: steps.bump.outputs.changed == 'true'
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE:${{ steps.bump.outputs.version }}" --format '{{json .Manifest}}' | python3 -c "import json,sys; print(json.load(sys.stdin)['digest'])")
          python3 .github/scripts/bump.py pin --version "${{ steps.bump.outputs.version }}" --digest "$digest"

      - name: Open bump PR
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: agent-update/${{ steps.bump.outputs.version }}
          commit-message: "Braiins Manager Agent ${{ steps.bump.outputs.version }}"
          title: "Braiins Manager Agent ${{ steps.bump.outputs.version }}"
          body: |
            Automated bump from the public release feed
            (https://downloads.braiins.com/braiins-manager-agent/index.json).

            Done by this workflow before opening the PR:
            - Dockerfile bumped to ${{ steps.bump.outputs.version }} with feed checksums
            - amd64 image smoke-tested (config flow, daemon start, status + widget endpoints)
            - multi-arch image pushed to `${{ env.IMAGE }}:${{ steps.bump.outputs.version }}`
            - compose pinned to the multi-arch index digest
            - manifest version + releaseNotes updated from the feed

            Review checklist before merging:
            - [ ] releaseNotes text reads sanely (it is taken verbatim from the feed)
            - [ ] update an Umbrel from this branch's store and verify the agent reconnects
          delete-branch: true
