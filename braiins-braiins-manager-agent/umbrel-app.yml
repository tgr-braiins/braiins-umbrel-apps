manifestVersion: 1.1
id: braiins-braiins-manager-agent
category: bitcoin
name: Braiins Manager Agent
version: "4.11.0"
tagline: Connect the miners on your local network to Braiins Manager
description: >-
  Braiins Manager Agent connects mining devices on your local network to
  Braiins Manager (manager.braiins.com), Braiins' fleet-management platform.
  The agent scans your network for miners, streams telemetry, and executes
  management commands (pool configuration, power modes, firmware installs,
  reboots) issued from Braiins Manager.


  To use it you need a free Braiins Manager account. Add a new agent in
  Braiins Manager to obtain an Agent ID and Secret key, then paste them into
  this app's settings page.
releaseNotes: |-
  The Braiins Manager Agent **4.11.0** release adds support for Auradine Teraflux and minor improvements.

  ### New Features
  - Support for Auradine Teraflux: Braiins Manager now supports miners running Auradine Teraflux firmware, including monitoring and management actions such as pause, resume, reboot, locate, and pool configuration.

  ### Improvements
  - MARA FW: Miners running MARA firmware now report their control board serial number.
  &nbsp;
  &nbsp;

  For help, bug reports, or feature requests, please create a [support ticket](https://help.braiins.com/en/support/tickets/new)

developer: Braiins
website: https://braiins.com/manager
dependencies: []
repo: https://github.com/tgr-braiins/braiins-umbrel-apps
support: https://academy.braiins.com/braiins-manager/overview

port: 4547
icon: https://raw.githubusercontent.com/tgr-braiins/braiins-umbrel-apps/main/braiins-braiins-manager-agent/icon.svg
gallery:
  - https://raw.githubusercontent.com/tgr-braiins/braiins-umbrel-apps/main/braiins-braiins-manager-agent/gallery/1.png
  - https://raw.githubusercontent.com/tgr-braiins/braiins-umbrel-apps/main/braiins-braiins-manager-agent/gallery/2.png
path: ""

defaultUsername: ""
defaultPassword: ""

