version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: braiins-braiins-manager-agent_web_1
      APP_PORT: 8080

  web:
    # TODO: move to a Braiins-owned registry before official-store submission
    image: ghcr.io/tgr-braiins/braiins-manager-agent:4.11.0@sha256:9ba12d710f6ffae52b17890f544d76b9378f5ee5554be3bb8e004b2aa9a052cc
    user: "1000:1000"
    init: true
    restart: on-failure
    stop_grace_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data:/data
